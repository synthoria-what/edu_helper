services:
  postgres:
    image: postgres:16-alpine
    container_name: edu_helper_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edu_helper}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-edu_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: edu_helper_backend
    environment:
      APP_NAME: ${APP_NAME:-EduHelper API}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-edu_helper}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-for-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://eduhelper.synthori.space,http://localhost,http://127.0.0.1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: edu_helper_frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
