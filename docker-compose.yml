services:
  backend:
    build:
      context: ./backend
    container_name: edu_helper_backend
    environment:
      APP_NAME: ${APP_NAME:-EduHelper API}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${DB_USER:-edu_helper_user}:${DB_PASSWORD:?Set DB_PASSWORD or DATABASE_URL in .env}@${DB_HOST:-ru.synthori.space}:${DB_PORT:-5432}/${DB_NAME:-edu_helper}}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-for-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://eduhelper.synthori.space,http://localhost,http://127.0.0.1}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${BACKEND_HOST:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    networks:
      proxy-network:
        aliases:
          - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: edu_helper_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST:-127.0.0.1}:${FRONTEND_PORT:-8080}:4173"
    networks:
      proxy-network:
        aliases:
          - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  proxy-network:
    external: true
